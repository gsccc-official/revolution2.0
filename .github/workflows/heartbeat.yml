name: Supabase Heartbeat

on:
  schedule:
    - cron: '0 8 */4 * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase to prevent inactivity pause
        run: |
          response=$(curl -s -o /dev/null -w "%{http_code}" \
            "${{ secrets.SUPABASE_URL }}/rest/v1/registrations?select=id&limit=1" \
            -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}")
          echo "Response code: $response"
          if [ "$response" != "200" ] && [ "$response" != "206" ]; then
            echo "Warning: unexpected response $response"
            exit 1
          fi
          echo "Supabase is alive."
